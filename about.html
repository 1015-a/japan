<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Japan Tours</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Prompt:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-overlay contact-bg"></div>

    <nav class="navbar">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/197/197604.png" alt="logo"> 
            <span>TRAVEL JAPAN</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="img.html">LOCATION</a></li>
            <li><a href="about.html">CONTACT US</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <div class="contact-card">
            <h2>Questions?</h2>
            
            <form action="#">
                <div class="input-group">
                    <input type="text" placeholder="Your name" required>
                </div>
                <div class="input-group">
                    <textarea placeholder="Comment" rows="1"></textarea>
                </div>
                <button type="submit" class="btn-send">Send</button>
            </form>
        </div>
    </div>

</body>
</html>
